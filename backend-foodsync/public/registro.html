<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<title>Registro | FoodSync</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="styles.css">

</head>

<body>

<header class="hero small">
    <h1>Crear Cuenta</h1>
</header>

<div class="container center">

    <div class="card form-card">

        <form id="registroForm" class="form">

            <label>Nombre</label>
            <input type="text" placeholder="Tu nombre completo" required>

            <label>Correo electronico</label>
            <input type="email" placeholder="ejemplo@email.com" required>

            <label>Contrasena</label>
            <input type="password" placeholder="Tu contrasena" required>

            <label>Tipo de usuario</label>
            <select required>
                <option value="" disabled selected>Selecciona una opcion</option>
                <option>Donante</option>
                <option>Organizacion</option>
            </select>

            <button class="btn btn-primary">Registrarse</button>

        </form>

        <a href="login.html" class="link">Ya tengo una cuenta</a>

    </div>

</div>

<script src="js/app.js"></script>

</body>
</html>
