<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<title>Registro | FoodSync</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="styles.css">

</head>

<body>

<header class="hero small">
    <h1>Crear Cuenta</h1>
</header>

<div class="container center">

    <div class="card form-card">

        <form id="registroForm" class="form">

            <label>Nombre</label>
            <input type="text" placeholder="Tu nombre completo">

            <label>Correo electrónico</label>
            <input type="email" placeholder="ejemplo@email.com">

            <label>Contraseña</label>
            <input type="password" placeholder="••••••••">

            <label>Tipo de usuario</label>
            <select>
                <option disabled selected>Selecciona una opción</option>
                <option>Donante</option>
                <option>Organización</option>
            </select>

            <button class="btn btn-primary">Registrarse</button>

        </form>

        <a href="index.html" class="link">← Volver al inicio</a>

    </div>

</div>

<script src="js/app.js"></script>

</body>
</html>
