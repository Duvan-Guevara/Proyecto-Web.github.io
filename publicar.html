<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<title>Publicar Donación | FoodSync</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="styles.css">

</head>

<body>

<header class="hero small">
    <h1>Nueva Donación</h1>
</header>

<div class="container center">

    <div class="card form-card">

        <form id="publicarForm" class="form">

            <label>Nombre del alimento</label>
            <input type="text" placeholder="Ej: Frutas, verduras...">

            <label>Cantidad (kg/unidades)</label>
            <input type="number" placeholder="Ej: 50">

            <label>Fecha disponible</label>
            <input type="date">

            <label>Descripción</label>
            <textarea placeholder="Detalles de la donación..."></textarea>

            <button class="btn btn-primary">Publicar Donación</button>

        </form>

        <a href="index.html" class="link">← Volver al inicio</a>

    </div>

</div>

<script src="js/app.js"></script>

</body>
</html>
